<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Bird</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
  }

  #ui {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
  }

  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    text-align: center;
  }

  .screen.active { display: flex; }

  .title {
    font-size: 28px;
    color: #fff;
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff;
    letter-spacing: 4px;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .subtitle {
    font-size: 10px;
    color: #0ff;
    opacity: 0.8;
    text-shadow: 0 0 6px #0ff;
  }

  .prompt {
    font-size: 9px;
    color: #ff0;
    text-shadow: 0 0 8px #ff0;
    animation: blink 0.9s step-end infinite;
  }

  .score-display {
    font-size: 14px;
    color: #fff;
    text-shadow: 0 0 8px #0ff;
  }

  .score-val {
    font-size: 32px;
    color: #0ff;
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
  }

  .best-val {
    font-size: 18px;
    color: #ff0;
    text-shadow: 0 0 8px #ff0;
  }

  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff; }
    50% { text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #0ff; }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="startScreen" class="screen active">
    <div class="title">NEON BIRD</div>
    <div class="subtitle">esquiva los pilares</div>
    <div class="prompt">[ click o espacio ]</div>
  </div>
  <div id="gameOverScreen" class="screen">
    <div class="title" style="font-size:18px; color:#f0f; text-shadow:0 0 10px #f0f, 0 0 20px #f0f;">GAME OVER</div>
    <div class="score-display">PUNTAJE</div>
    <div class="score-val" id="finalScore">0</div>
    <div class="score-display" style="font-size:10px;">MEJOR</div>
    <div class="best-val" id="bestScore">0</div>
    <div class="prompt" style="margin-top:10px;">[ click o espacio ]</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Responsive sizing
const BASE_W = 400, BASE_H = 600;
let scale = 1;

function resize() {
  const maxH = window.innerHeight;
  const maxW = window.innerWidth;
  scale = Math.min(maxW / BASE_W, maxH / BASE_H, 1.5);
  canvas.width = BASE_W * scale;
  canvas.height = BASE_H * scale;
  ctx.scale(scale, scale);
}
resize();
window.addEventListener('resize', resize);

const W = BASE_W, H = BASE_H;

// Stars
const stars = Array.from({length: 80}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.5 + 0.3,
  a: Math.random(),
  speed: Math.random() * 0.3 + 0.1
}));

// Game state
let state = 'start'; // start | play | dead
let score = 0, best = 0;
let raf;

// Bird
const bird = { x: 80, y: H/2, vy: 0, r: 14 };
const GRAVITY = 0.38;
const JUMP = -7.5;
const bird_colors = { core: '#fff', glow1: '#0ff', glow2: '#00f' };

// Pipes
const PIPE_W = 52;
const PIPE_GAP = 155;
const PIPE_SPEED = 2.8;
const PIPE_INTERVAL = 1600;
let pipes = [];
let lastPipe = 0;
let frameTime = 0;
let lastTime = 0;
let scored = new Set();

// Particles
let particles = [];

function spawnPipe() {
  const minY = 80, maxY = H - 80 - PIPE_GAP;
  const topH = Math.random() * (maxY - minY) + minY;
  pipes.push({ x: W + PIPE_W, topH, passed: false });
}

function addParticles(x, y) {
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      color: ['#0ff','#ff0','#f0f','#fff'][Math.floor(Math.random()*4)],
      r: Math.random() * 3 + 1
    });
  }
}

function reset() {
  bird.x = 80; bird.y = H/2; bird.vy = 0;
  pipes = [];
  particles = [];
  score = 0;
  lastPipe = 0;
  frameTime = 0;
  scored.clear();
}

function jump() {
  if (state === 'start') {
    state = 'play';
    document.getElementById('startScreen').classList.remove('active');
    bird.vy = JUMP;
    lastTime = performance.now();
  } else if (state === 'play') {
    bird.vy = JUMP;
  } else if (state === 'dead') {
    state = 'play';
    document.getElementById('gameOverScreen').classList.remove('active');
    reset();
    bird.vy = JUMP;
    lastTime = performance.now();
  }
}

window.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive: false});

function drawBird(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Outer glow
  const g1 = ctx.createRadialGradient(0, 0, 2, 0, 0, bird.r * 2.5);
  g1.addColorStop(0, 'rgba(0,255,255,0.3)');
  g1.addColorStop(1, 'rgba(0,255,255,0)');
  ctx.beginPath();
  ctx.arc(0, 0, bird.r * 2.5, 0, Math.PI*2);
  ctx.fillStyle = g1;
  ctx.fill();

  // Body glow
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 18;
  ctx.beginPath();
  ctx.arc(0, 0, bird.r, 0, Math.PI*2);
  const g2 = ctx.createRadialGradient(-3, -3, 1, 0, 0, bird.r);
  g2.addColorStop(0, '#fff');
  g2.addColorStop(0.5, '#0ff');
  g2.addColorStop(1, '#006');
  ctx.fillStyle = g2;
  ctx.fill();

  // Wing
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.ellipse(-4, 4, 8, 4, 0.3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,200,255,0.6)';
  ctx.fill();

  // Eye
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.arc(6, -3, 3, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(7, -3, 1.5, 0, Math.PI*2);
  ctx.fillStyle = '#000';
  ctx.fill();

  // Beak
  ctx.beginPath();
  ctx.moveTo(10, 0);
  ctx.lineTo(17, -2);
  ctx.lineTo(17, 2);
  ctx.closePath();
  ctx.fillStyle = '#ff0';
  ctx.shadowColor = '#ff0';
  ctx.shadowBlur = 6;
  ctx.fill();

  ctx.restore();
}

function drawPipe(x, topH) {
  const botY = topH + PIPE_GAP;

  // Neon green glow
  ctx.shadowColor = '#0f0';
  ctx.shadowBlur = 16;

  // Top pipe
  ctx.fillStyle = '#003300';
  ctx.fillRect(x, 0, PIPE_W, topH);
  // Highlight
  ctx.fillStyle = '#00aa00';
  ctx.fillRect(x + 4, 0, 6, topH);
  ctx.fillStyle = '#00ff44';
  ctx.fillRect(x + 4, 0, 2, topH);

  // Cap top
  ctx.fillStyle = '#00cc00';
  ctx.fillRect(x - 5, topH - 22, PIPE_W + 10, 22);
  ctx.fillStyle = '#00ff66';
  ctx.fillRect(x - 5, topH - 22, PIPE_W + 10, 4);

  // Bottom pipe
  ctx.fillStyle = '#003300';
  ctx.fillRect(x, botY, PIPE_W, H - botY);
  ctx.fillStyle = '#00aa00';
  ctx.fillRect(x + 4, botY, 6, H - botY);
  ctx.fillStyle = '#00ff44';
  ctx.fillRect(x + 4, botY, 2, H - botY);

  // Cap bottom
  ctx.fillStyle = '#00cc00';
  ctx.fillRect(x - 5, botY, PIPE_W + 10, 22);
  ctx.fillStyle = '#00ff66';
  ctx.fillRect(x - 5, botY, PIPE_W + 10, 4);

  ctx.shadowBlur = 0;
}

function drawBg() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#000012');
  sky.addColorStop(1, '#000830');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    s.a += s.speed * 0.02;
    const alpha = 0.5 + 0.5 * Math.sin(s.a);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });

  // Ground
  ctx.fillStyle = '#001a00';
  ctx.fillRect(0, H - 30, W, 30);
  ctx.fillStyle = '#00ff44';
  ctx.shadowColor = '#0f0';
  ctx.shadowBlur = 10;
  ctx.fillRect(0, H - 30, W, 4);
  ctx.shadowBlur = 0;
}

function drawScore() {
  ctx.save();
  ctx.font = '24px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#fff';
  ctx.fillText(score, W/2, 50);
  ctx.restore();
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.03;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  });
}

function collides(pipe) {
  const bx = bird.x, by = bird.y, br = bird.r - 2;
  const px = pipe.x, pw = PIPE_W;
  const capX = px - 5, capW = pw + 10;
  const topH = pipe.topH, botY = topH + PIPE_GAP;

  // Check vertical range
  if (bx + br < capX || bx - br > capX + capW) return false;

  // Pipe body collision
  if (bx + br > px && bx - br < px + pw) {
    if (by - br < topH || by + br > botY) return true;
  }
  // Cap collision
  if (bx + br > capX && bx - br < capX + capW) {
    if (by - br < topH || by + br > botY) return true;
  }
  return false;
}

function gameLoop(ts) {
  raf = requestAnimationFrame(gameLoop);
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  ctx.clearRect(0, 0, W, H);
  drawBg();

  if (state === 'play') {
    frameTime += dt;

    // Spawn pipes
    if (frameTime - lastPipe > PIPE_INTERVAL) {
      spawnPipe();
      lastPipe = frameTime;
    }

    // Update bird
    bird.vy += GRAVITY;
    bird.vy = Math.min(bird.vy, 12);
    bird.y += bird.vy;

    // Update pipes
    pipes.forEach(p => { p.x -= PIPE_SPEED; });
    pipes = pipes.filter(p => p.x + PIPE_W + 10 > 0);

    // Score
    pipes.forEach(p => {
      if (!p.passed && p.x + PIPE_W < bird.x) {
        p.passed = true;
        score++;
        addParticles(bird.x, bird.y);
      }
    });

    // Death checks
    if (bird.y + bird.r > H - 30 || bird.y - bird.r < 0) {
      die();
    }
    pipes.forEach(p => { if (collides(p)) die(); });
  }

  // Draw pipes
  pipes.forEach(p => drawPipe(p.x, p.topH));

  // Bird angle
  let angle = 0;
  if (state === 'play') {
    angle = Math.max(-0.4, Math.min(Math.PI/2, bird.vy * 0.07));
  }
  drawBird(bird.x, bird.y, angle);

  // Particles
  updateParticles();

  if (state === 'play' || state === 'dead') drawScore();

  // Idle bob in start
  if (state === 'start') {
    bird.y = H/2 + Math.sin(ts * 0.002) * 10;
  }
}

function die() {
  if (state !== 'play') return;
  state = 'dead';
  addParticles(bird.x, bird.y);
  if (score > best) best = score;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('bestScore').textContent = best;
  document.getElementById('gameOverScreen').classList.add('active');
}

lastTime = performance.now();
raf = requestAnimationFrame(gameLoop);
</script>
</body>
</html>
