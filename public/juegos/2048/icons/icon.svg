<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1a3a"/>
      <stop offset="1" stop-color="#060d1f"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00ffcc"/>
      <stop offset="1" stop-color="#0066ff"/>
    </linearGradient>
  </defs>

  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="100" fill="#0066ff" opacity="0.06"/>

  <!-- Tile grande 2048 centrada, con glow dorado -->
  <rect x="46" y="58" width="164" height="110" rx="18" fill="url(#goldGrad)"/>
  <rect x="46" y="58" width="164" height="110" rx="18" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.5"/>
  
  <!-- Glow exterior -->
  <rect x="42" y="54" width="172" height="118" rx="22" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
  
  <!-- Texto 2048 -->
  <text x="128" y="130" text-anchor="middle" fill="#0a1428" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="900" letter-spacing="-2">2048</text>

  <!-- Tiles pequeñas arriba-izquierda (2, 4) -->
  <rect x="36" y="26" width="30" height="30" rx="6" fill="#1e40af"/>
  <text x="51" y="48" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="16" font-weight="800">2</text>
  
  <rect x="70" y="26" width="30" height="30" rx="6" fill="#2563eb"/>
  <text x="85" y="48" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="16" font-weight="800">4</text>

  <!-- Tiles pequeñas arriba-derecha (8, 16) -->
  <rect x="156" y="26" width="30" height="30" rx="6" fill="#3b82f6"/>
  <text x="171" y="48" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="16" font-weight="800">8</text>
  
  <rect x="190" y="26" width="30" height="30" rx="6" fill="#06b6d4"/>
  <text x="205" y="48" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="800">16</text>

  <!-- Título "JUEGAYA" abajo -->
  <text x="128" y="200" text-anchor="middle" fill="url(#titleGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" letter-spacing="3">JUEGAYA</text>
  <text x="128" y="220" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" letter-spacing="2">FUSIONA Y GANA</text>
</svg>
